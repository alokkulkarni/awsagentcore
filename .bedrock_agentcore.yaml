# Amazon Bedrock AgentCore Starter Toolkit configuration.
# Generated for: aria-banking-agent
# Framework: Strands Agents
# Channels: HTTP /invocations (chat) + WebSocket /ws (voice)
#
# Deploy commands:
#   Build + push to ECR locally:  agentcore deploy --local-build
#   Cloud CodeBuild (no Docker):  agentcore deploy
#   Local dev server:             agentcore dev  (or: uvicorn aria.agentcore_app:app --port 8080 --reload)

bedrock_agentcore:
  agents:
    - name: aria-banking-agent
      entrypoint: aria/agentcore_app.py
      deployment_type: container
      requirements_file: requirements-docker.txt
      ecr: auto
      execution_role: null        # auto-created by agentcore deploy
      region: us-east-1           # must be a region where AgentCore Runtime is available
      idle_timeout: 1800          # 30 min idle before session terminates
      max_lifetime: 28800         # 8 hours max lifetime
      protocol: HTTP              # Handles both /invocations and /ws on port 8080
      memory:
        mode: STM_AND_LTM         # Short-term (session turns) + Long-term (cross-session preferences)
      observability:
        enabled: true             # CloudWatch + X-Ray traces via OpenTelemetry
