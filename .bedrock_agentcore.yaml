# Amazon Bedrock AgentCore Starter Toolkit configuration.
# Generated for: aria-banking-agent
# Framework: Strands Agents
# Channels: HTTP /invocations (chat) + WebSocket /ws (voice)
#
# Deploy commands:
#   Cloud CodeBuild (no Docker):  agentcore launch --agent aria-banking-agent
#   Local Docker build:           agentcore launch --agent aria-banking-agent --local-build
#   Local dev server:             agentcore dev

default_agent: aria-banking-agent

agents:
  aria-banking-agent:
    name: aria-banking-agent
    entrypoint: aria/agentcore_app.py
    deployment_type: container
    aws:
      region: eu-west-2
      execution_role_auto_create: true
      ecr_auto_create: true
      lifecycle_configuration:
        idle_runtime_session_timeout: 1800
        max_lifetime: 28800
      protocol_configuration:
        server_protocol: HTTP
      observability:
        enabled: true
    memory:
      mode: STM_AND_LTM
